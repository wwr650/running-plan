<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Plan</title>
    <link rel="icon" href="https://pub-21bfc399998f49b3be629ce080154177.r2.dev/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="https://pub-21bfc399998f49b3be629ce080154177.r2.dev/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="https://pub-21bfc399998f49b3be629ce080154177.r2.dev/apple-touch-icon.png">
    <!-- marked.js 用于渲染 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .home-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .content {
            padding: 30px;
        }

        /* 分类筛选栏 */
        .category-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .category-btn {
            padding: 8px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 20px;
            background: white;
            color: #6b7280;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .category-btn:hover {
            border-color: #4f46e5;
            color: #4f46e5;
            transform: translateY(-1px);
        }

        .category-btn.active {
            background: #4f46e5;
            border-color: #4f46e5;
            color: white;
        }

        /* 文件列表 */
        .file-section {
            margin-bottom: 25px;
        }

        .file-list {
            list-style: none;
        }

        .file-item {
            background: #f8fafc;
            margin-bottom: 10px;
            border-radius: 10px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .file-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #4f46e5;
        }

        .file-item.active {
            border-color: #4f46e5;
            background: #eef2ff;
        }

        .file-link {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            text-decoration: none;
            color: inherit;
        }

        .file-icon {
            width: 28px;
            height: 28px;
            margin-right: 15px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
            flex-shrink: 0;
        }

        .file-icon.md { background: #10b981; }

        .file-name {
            font-weight: 600;
            font-size: 1.05em;
            color: #1f2937;
        }

        .file-item:hover .file-name {
            color: #4f46e5;
        }

        .file-path {
            font-size: 0.8em;
            color: #9ca3af;
            margin-left: auto;
            padding-left: 10px;
        }

        /* 内容区域 */
        .content-area {
            background: #f8fafc;
            border-radius: 12px;
            padding: 30px;
            min-height: 200px;
            border: 1px solid #e5e7eb;
            display: none;
        }

        .content-area.visible {
            display: block;
        }

        .content-area h1,
        .content-area h2,
        .content-area h3,
        .content-area h4 {
            color: #1f2937;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }

        .content-area h1:first-child,
        .content-area h2:first-child,
        .content-area h3:first-child {
            margin-top: 0;
        }

        .content-area p {
            margin-bottom: 1em;
            color: #374151;
        }

        .content-area ul,
        .content-area ol {
            margin-bottom: 1em;
            padding-left: 1.5em;
        }

        .content-area li {
            margin-bottom: 0.3em;
            color: #374151;
        }

        .content-area table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1.5em;
            font-size: 0.9em;
        }

        .content-area th,
        .content-area td {
            border: 1px solid #d1d5db;
            padding: 10px 12px;
            text-align: left;
        }

        .content-area th {
            background: #4f46e5;
            color: white;
            font-weight: 600;
        }

        .content-area tr:nth-child(even) {
            background: #f1f5f9;
        }

        .content-area tr:hover {
            background: #e0e7ff;
        }

        .content-area blockquote {
            border-left: 4px solid #4f46e5;
            padding: 12px 20px;
            margin: 1em 0;
            background: #eef2ff;
            border-radius: 0 8px 8px 0;
            color: #374151;
        }

        .content-area pre {
            background: #1f2937;
            color: #f3f4f6;
            padding: 16px 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1em;
            font-size: 0.9em;
        }

        .content-area code {
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9em;
        }

        .content-area p code {
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
            color: #4f46e5;
        }

        .content-area hr {
            border: none;
            border-top: 2px solid #e5e7eb;
            margin: 1.5em 0;
        }

        .content-area img {
            max-width: 100%;
            border-radius: 8px;
            margin: 1em 0;
        }

        .content-area strong {
            color: #1f2937;
        }

        /* 文章目录 (TOC) */
        .toc {
            background: white;
            border: 1px solid #e0e7ff;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 24px;
        }

        .toc-header {
            font-size: 1.05em;
            font-weight: 700;
            color: #4f46e5;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e0e7ff;
        }

        .toc-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .toc-item {
            margin-bottom: 4px;
        }

        .toc-link {
            display: block;
            padding: 5px 10px;
            color: #374151;
            text-decoration: none;
            font-size: 0.92em;
            border-radius: 6px;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .toc-link:hover {
            background: #eef2ff;
            color: #4f46e5;
            border-left-color: #4f46e5;
        }

        .toc-level-1 { padding-left: 4px; font-weight: 600; }
        .toc-level-2 { padding-left: 24px; }
        .toc-level-3 { padding-left: 44px; font-size: 0.88em; }
        .toc-level-4 { padding-left: 64px; font-size: 0.85em; color: #6b7280; }

        .content-area h1[id]::before,
        .content-area h2[id]::before,
        .content-area h3[id]::before,
        .content-area h4[id]::before {
            content: '';
            display: block;
            height: 20px;
            margin-top: -20px;
            visibility: hidden;
        }

        /* 空状态和加载 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }

        .empty-state p {
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .loading {
            opacity: 0.6;
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .loading-spinner::after {
            content: '';
            width: 30px;
            height: 30px;
            border: 3px solid #e5e7eb;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 返回按钮 */
        .back-btn {
            display: none;
            padding: 8px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            color: #6b7280;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .back-btn:hover {
            border-color: #4f46e5;
            color: #4f46e5;
        }

        .back-btn.visible {
            display: inline-block;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { border-radius: 10px; }
            .header { padding: 20px; }
            .header h1 { font-size: 2em; }
            .content { padding: 20px; }
            .home-button {
                position: relative;
                top: auto;
                right: auto;
                display: inline-block;
                margin-top: 15px;
                padding: 6px 12px;
                font-size: 0.8em;
            }
            .category-btn { padding: 6px 14px; font-size: 0.85em; }
            .content-area { padding: 20px; }
            .content-area table { font-size: 0.8em; }
            .content-area th,
            .content-area td { padding: 6px 8px; }
            .file-path { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="https://wwr650.github.io" class="home-button">🏠 返回主页</a>
            <h1 id="siteTitle">🏃 Running Plan</h1>
            <p id="siteDescription">选择分类查看训练计划与跑步记录</p>
        </div>

        <div class="content">
            <!-- 分类筛选栏 -->
            <div class="category-bar" id="categoryBar">
                <div class="loading-spinner"></div>
            </div>

            <!-- 返回按钮 -->
            <button class="back-btn" id="backBtn" onclick="showCategoryList()">← 返回分类列表</button>

            <!-- 文件列表 -->
            <div class="file-section" id="fileSection"></div>

            <!-- Markdown 渲染内容 -->
            <div class="content-area" id="contentArea"></div>

            <!-- 最后更新 -->
            <div id="lastUpdatedSection" style="margin-top: 20px; padding: 12px; background: #f8fafc; border-radius: 10px; border-left: 4px solid #4f46e5;">
                <strong>最后更新:</strong> <span id="lastUpdated">加载中...</span>
            </div>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'wwr650';
        const REPO_NAME = 'running-plan';
        const BRANCH = 'main';
        const POST_DIR = '_post';

        let allMdFiles = [];       // 所有 _post 下的 md 文件
        let categories = {};       // 按子文件夹分组 { categoryName: [files] }
        let config = {};           // 配置数据
        let currentCategory = '';  // 当前选中的分类
        let activeFileItem = null; // 当前激活的文件项

        // ===================== 初始化 =====================
        async function init() {
            try {
                await loadConfig();
                await fetchRepoTree();
                renderCategoryBar();
                applyDefaultCategory();
            } catch (err) {
                console.error('初始化失败:', err);
                showError('页面加载失败，请刷新重试');
            }
        }

        // ===================== 加载配置 =====================
        async function loadConfig() {
            try {
                const resp = await fetch(
                    `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/config.json`
                );
                if (resp.ok) {
                    config = await resp.json();
                    if (config.siteTitle) {
                        document.getElementById('siteTitle').textContent = config.siteTitle;
                    }
                    if (config.siteDescription) {
                        document.getElementById('siteDescription').textContent = config.siteDescription;
                    }
                }
            } catch (e) {
                console.warn('config.json 加载失败，使用默认配置', e);
            }
        }

        // ===================== 获取仓库文件树 =====================
        async function fetchRepoTree() {
            const resp = await fetch(
                `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/trees/${BRANCH}?recursive=1`
            );
            if (!resp.ok) throw new Error(`GitHub API 返回 ${resp.status}`);
            const data = await resp.json();

            // 更新最后更新时间
            if (config.lastUpdated) {
                document.getElementById('lastUpdated').textContent = config.lastUpdated;
            } else {
                const repoResp = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`
                );
                const repoData = await repoResp.json();
                document.getElementById('lastUpdated').textContent =
                    new Date(repoData.updated_at).toLocaleString('zh-CN');
            }

            // 筛选 _post 下的 md 文件，按子文件夹分组
            const mdEntries = data.tree.filter(item =>
                item.type === 'blob' &&
                item.path.startsWith(POST_DIR + '/') &&
                item.path.endsWith('.md')
            );

            allMdFiles = mdEntries.map(item => {
                const parts = item.path.split('/');
                const category = parts[1];       // 子文件夹名
                const fileName = parts.slice(2).join('/'); // 文件名（含子路径）
                return {
                    path: item.path,
                    category: category,
                    fileName: fileName,
                    displayName: fileName.replace('.md', ''),
                    rawUrl: `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${item.path}`
                };
            });

            // 按分类分组
            categories = {};
            for (const file of allMdFiles) {
                if (!categories[file.category]) {
                    categories[file.category] = [];
                }
                categories[file.category].push(file);
            }
        }

        // ===================== 渲染分类筛选栏 =====================
        function renderCategoryBar() {
            const bar = document.getElementById('categoryBar');
            const categoryNames = Object.keys(categories);

            if (categoryNames.length === 0) {
                bar.innerHTML = `<div class="empty-state"><p>📂 _post 文件夹中暂无内容</p></div>`;
                document.getElementById('fileSection').innerHTML = `
                    <div class="empty-state">
                        <p>📝 暂无文件</p>
                        <p>在 _post 目录下创建子文件夹并添加 .md 文件即可显示</p>
                    </div>
                `;
                return;
            }

            bar.innerHTML = categoryNames.map(name => `
                <button class="category-btn" data-category="${name}" onclick="selectCategory('${name}')">
                    📁 ${name}
                </button>
            `).join('');
        }

        // ===================== 应用默认分类 =====================
        function applyDefaultCategory() {
            const categoryNames = Object.keys(categories);
            if (categoryNames.length === 0) return;

            // 优先使用配置中的默认分类，否则使用第一个
            const defaultCat = config.defaultCategory && categories[config.defaultCategory]
                ? config.defaultCategory
                : categoryNames[0];

            selectCategory(defaultCat);
        }

        // ===================== 选择分类 =====================
        function selectCategory(category) {
            currentCategory = category;
            activeFileItem = null;

            // 更新按钮状态
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });

            // 隐藏内容区
            document.getElementById('contentArea').classList.remove('visible');
            document.getElementById('backBtn').classList.remove('visible');

            // 渲染文件列表
            renderFileList(category);
        }

        // ===================== 渲染文件列表 =====================
        function renderFileList(category) {
            const section = document.getElementById('fileSection');
            const files = categories[category] || [];

            if (files.length === 0) {
                section.innerHTML = `<div class="empty-state"><p>📝 此分类暂无文件</p></div>`;
                return;
            }

            section.innerHTML = `
                <ul class="file-list fade-in">
                    ${files.map((file, index) => `
                        <li class="file-item" data-index="${index}" onclick="selectFile('${category}', ${index}, this)">
                            <div class="file-link">
                                <div class="file-icon md">M</div>
                                <span class="file-name">${file.displayName}</span>
                                <span class="file-path">${file.category}/${file.fileName}</span>
                            </div>
                        </li>
                    `).join('')}
                </ul>
            `;
        }

        // ===================== 选择文件 =====================
        async function selectFile(category, index, element) {
            // 更新激活状态
            if (activeFileItem) {
                activeFileItem.classList.remove('active');
            }
            element.classList.add('active');
            activeFileItem = element;

            const file = categories[category][index];
            const contentArea = document.getElementById('contentArea');
            const backBtn = document.getElementById('backBtn');

            // 显示加载状态
            contentArea.innerHTML = `<div class="loading-spinner"></div>`;
            contentArea.classList.add('visible');
            backBtn.classList.add('visible');

            // 滚动到内容区
            contentArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

            try {
                const resp = await fetch(file.rawUrl);
                if (!resp.ok) throw new Error(`加载失败: ${resp.status}`);
                const markdown = await resp.text();

                // 渲染 Markdown
                renderMarkdown(markdown, contentArea);
            } catch (err) {
                console.error('加载文件失败:', err);
                contentArea.innerHTML = `
                    <div class="empty-state">
                        <p>❌ 加载文件失败</p>
                        <p>${err.message}</p>
                    </div>
                `;
            }
        }

        // ===================== 渲染 Markdown（含目录生成）=====================
        function renderMarkdown(markdown, container) {
            if (typeof marked === 'undefined') {
                container.innerHTML = `<div class="empty-state"><p>❌ Markdown 渲染库加载失败</p></div>`;
                return;
            }

            marked.setOptions({
                breaks: true,
                gfm: true,
            });

            let html = marked.parse(markdown);

            // 为标题添加 ID 并收集目录项
            const tocItems = [];
            const idMap = {};

            html = html.replace(/<h([1-6])>(.*?)<\/h\1>/gi, (match, level, content) => {
                // 去除内部 HTML 标签，获取纯文本
                const cleanText = content.replace(/<[^>]*>/g, '');
                // 生成锚点 ID
                let id = cleanText.toLowerCase()
                    .replace(/[^\w\u4e00-\u9fff]+/g, '-')
                    .replace(/^-+|-+$/g, '')
                    .substring(0, 60) || 'section';

                // 处理重复 ID
                if (idMap[id]) {
                    idMap[id]++;
                    id += `-${idMap[id]}`;
                } else {
                    idMap[id] = 1;
                }

                tocItems.push({ level: parseInt(level), text: cleanText, id });
                return `<h${level} id="${id}">${content}</h${level}>`;
            });

            // 构建目录 HTML
            let tocHtml = '';
            if (tocItems.length >= 2) {
                tocHtml = '<div class="toc"><div class="toc-header">📑 目录</div><ul class="toc-list">';
                tocItems.forEach(item => {
                    tocHtml += `<li class="toc-item toc-level-${item.level}">
                        <a href="#${item.id}" class="toc-link">${item.text}</a>
                    </li>`;
                });
                tocHtml += '</ul></div>';
            }

            container.innerHTML = `<div class="fade-in">${tocHtml}${html}</div>`;

            // 给目录链接添加平滑滚动
            container.querySelectorAll('.toc-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetId = link.getAttribute('href').substring(1);
                    const target = document.getElementById(targetId);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        // 更新 URL hash
                        history.pushState(null, '', '#' + targetId);
                    }
                });
            });
        }

        // ===================== 返回分类列表 =====================
        function showCategoryList() {
            document.getElementById('contentArea').classList.remove('visible');
            document.getElementById('backBtn').classList.remove('visible');
            if (activeFileItem) {
                activeFileItem.classList.remove('active');
                activeFileItem = null;
            }
        }

        // ===================== 显示错误 =====================
        function showError(message) {
            const section = document.getElementById('fileSection');
            section.innerHTML = `
                <div class="empty-state">
                    <p>❌ ${message}</p>
                </div>
            `;
        }

        // 启动
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
